<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login - Mirador Central</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
  <div class="wrap">
    <div class="card" style="max-width:520px;margin:60px auto;">
      <h1>Ingreso al Sistema Mirador Central</h1>
      <p>Selecciona el tipo de actor para entrar con sus permisos.</p>
      <form id="login-form" class="grid">
        <div class="full">
          <label>Actor</label>
          <select id="actor_select" required>
            <option>Administrador</option>
            <option>Auxiliar Administrativo</option>
            <option>Vigilante</option>
            <option>Residente</option>
          </select>
        </div>
        <div><button type="submit">Entrar al Panel</button></div>
      </form>
      <div id="msg"></div>
    </div>
  </div>
  <script src="/login.js"></script>
</body>
</html>
